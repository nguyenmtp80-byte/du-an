# URL kết nối tới PostgreSQL với tên database chính xác của nhóm
spring.datasource.url=jdbc:postgresql://localhost:5432/market-place-app
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# Cấu hình Hibernate và tự động tạo/cập nhật bảng dữ liệu
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Tắt cảnh báo open-in-view (tùy chọn để log chạy sạch hơn)
spring.jpa.open-in-view=false

# Swagger / OpenAPI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha