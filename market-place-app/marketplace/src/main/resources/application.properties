# ============================================================
# DATABASE CONFIGURATION (PostgreSQL)
# Sử dụng biến môi trường với giá trị mặc định (default fallback)
# Mỗi dev có thể set env variables riêng hoặc để mặc định chạy local
# ============================================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/market-place-app}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# HIBERNATE / JPA CONFIGURATION
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Tắt cảnh báo open-in-view (tùy chọn để log chạy sạch hơn)
spring.jpa.open-in-view=false

# ============================================================
# SWAGGER / OPENAPI (springdoc)
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=${SERVER_PORT:8080}
