# ============================================================
# DATABASE CONFIGURATION (PostgreSQL)
# Sử dụng biến môi trường với giá trị mặc định (default fallback)
# Mỗi dev có thể set env variables riêng hoặc để mặc định chạy local
# ============================================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/market-place-app}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# HIBERNATE / JPA CONFIGURATION
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Tắt cảnh báo open-in-view (tùy chọn để log chạy sạch hơn)
spring.jpa.open-in-view=false

# ============================================================
# SWAGGER / OPENAPI (springdoc)
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ============================================================
# FILE UPLOAD CONFIGURATION
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Thư mục lưu file upload (có thể đổi bằng env UPLOAD_DIR)
app.upload.dir=${UPLOAD_DIR:uploads}

# ============================================================
# PAYMENT / QR CODE CONFIGURATION (Sandbox)
# ============================================================
# Mã BIN ngân hàng (MB Bank: 970422, Vietcombank: 970436, Techcombank: 970407)
payment.bank.code=${PAYMENT_BANK_CODE:970422}
# Số tài khoản sandbox
payment.bank.account=${PAYMENT_BANK_ACCOUNT:0987654321}
# Tên chủ tài khoản
payment.bank.name=${PAYMENT_BANK_NAME:STUDENT MARKETPLACE}

# ============================================================
# VNPAY CONFIGURATION (Sandbox)
# ============================================================
# Đây là account public test thường được chia sẻ trên mạng để học tập.
vnpay.tmnCode=${VNPAY_TMN_CODE:CGXZLS0Z}
vnpay.hashSecret=${VNPAY_HASH_SECRET:XNBVCOQQRQZQZNSOQRQZNSOQRQZNSOQ}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
# Deep-link or backend return URL
vnpay.returnUrl=${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay/return}

# ============================================================
# GOOGLE LOGIN CONFIGURATION
# ============================================================
# Client ID từ Google Cloud Console (Web client) — dùng để verify ID token
google.client.id=${GOOGLE_CLIENT_ID:your-google-client-id.apps.googleusercontent.com}
# Sandbox mode: true = cho phép test với token giả (mặc định bật để test Postman)
# Khi deploy production, set = false
google.login.sandbox=${GOOGLE_LOGIN_SANDBOX:true}

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=${SERVER_PORT:8080}
